name: Build & Push to Docker Hub

on:
  push:
    branches: ["main"]

env:
  DOCKERHUB_REPO: thawatchai95/hello-web
  MANIFEST_REPO: thawatchai-rvc/02-Action-WebDemo-CICD  # เปลี่ยนเป็น repo ของคุณ
  MANIFEST_BRANCH: main
  MANIFEST_PATH: k8s/01-deployment.yaml

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:sha-${{ github.sha }}

    # 👇 เพิ่มส่วนนี้: อัปเดต image tag ใน manifest repo
      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|image: .*|image: thawatchai95/hello-web:${{ github.sha }}|g" k8s/01-deployment.yaml
          cat k8s/01-deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/01-deployment.yaml

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update deployment image to ${{ github.sha }}"
          git push